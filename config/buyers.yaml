# ══════════════════════════════════════════════════════════════════════
#  JARVIS — Buyer Configuration
#  File: config/buyers.yaml
#
#  HOW TO ADD A NEW BUYER:
#  ─────────────────────────
#  Copy the Cecil block below and fill in:
#    name:         Internal key (no spaces)
#    aliases:      How you say the name (voice variations, English only)
#    order_types:  Which order types this buyer uses
#    subject_keywords: Fragments that appear in email subjects
#    attachment_prefix: How PO filenames start
#
#  COLLECTION NUMBER ENCODING (applies to all collection-type buyers):
#    Voice:  "collection 10.2"  or  "collection 10 point 2"
#    Stored: "102"  (year prefix added at runtime → "2026102")
#    Rule:   remove the decimal dot:  10.2 → 102,  10.5 → 105
#            whole numbers get ×10:   10   → 100,   3   → 30
#
#  ATTACHMENT SAVE PATH (set in jarvis.yaml):
#    E:/Projects/JARVIS/attachments/{buyer_name}/{collection_code}/
# ══════════════════════════════════════════════════════════════════════

buyers:

  # ── Cecil ──────────────────────────────────────────────────────────
  - name: Cecil
    aliases:
      - cecil
      - "Cecil"
    order_types:
      - collection          # active for Phase 1
      # - cw                # add later
      # - qr                # add later
      # - nos               # add later

    collection:
      # Fragments used in subject scoring to identify collection emails.
      # These do NOT all need to appear — they are used as scoring signals.
      # See outlook_workflows.py → _score_subject() for the full logic.
      subject_keywords:
        - "coll"
        - "collection"
        - "order sheet"
      # Attachment filename structure:
      #   {collection_code}-{po_number}.pdf
      #   e.g. 2026102-325978.pdf
      attachment_pattern: "{collection_code}-{po_number}.pdf"
      attachment_prefix: ""

